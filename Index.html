<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Driver App</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js">
</script>

    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        .ride-card {
            border: 1px solid #ccc;
            padding: 15px;
            margin-top: 20px;
            display: none;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>Driver App</h2>

    <div id="status">Conectando...</div>

    <div id="rideCard" class="ride-card">
        <h3>New Ride</h3>

        <p><b>Ride Id:</b> <span id="rideId"></span></p>
        <p><b>Rider Id:</b> <span id="riderId"></span></p>
        <p><b>Pickup:</b> <span id="pickupAddress"></span></p>

        <button onclick="acceptRide()">
            Accept Ride
        </button>
    </div>

    <script>

        let currentRide = null;

        const driverId = "11111111-1111-1111-1111-111111111111";

const connection = new signalR.HubConnectionBuilder()
    .withUrl(`https://localhost:7211/driver-hub?driverId=${driverId}`)
    .configureLogging(signalR.LogLevel.Trace)
    .withAutomaticReconnect()
    .build();

connection.start()
    .then(() => {
        console.log("CONECTED");
        document.getElementById("status").innerText = "Conected";
    })
    .catch(err => {
        console.error("ERROR START:", err);
        document.getElementById("status").innerText = "Error to conect";
    });

connection.onclose(err => {
    console.error("ONCLOSE:", err);
});

connection.on("RideOffered", function (ride) {

    console.log("RIDE RECEIVED", ride);

    alert("New Ride Received!");

    currentRide = ride;

    document.getElementById("rideId").innerText = ride.rideId;
    document.getElementById("riderId").innerText = ride.riderId;
    document.getElementById("pickupAddress").innerText = ride.pickupAddress;

    document.getElementById("rideCard").style.display = "block";
});

        async function acceptRide() {

            if (!currentRide)
                return;

            const payload = {
                rideId: currentRide.rideId,
                driverId: currentRide.driverId,
                riderId: currentRide.riderId
            };

            try {

                const response = await fetch(
                    "https://localhost:7211/api/drivers/AcceptRide",
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify(payload)
                    });

                if (response.ok) {
                    alert("Ride accepted!");
                    document.getElementById("rideCard").style.display = "none";
                }
                else {
                    alert("Error to accept Ride");
                }

            } catch (e) {
                console.error(e);
            }
        }

    </script>

</body>
</html>
